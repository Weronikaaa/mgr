name: Base CI/CD

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read
  checks: read
  deployments: read
  packages: read
  pull-requests: read
  repository-projects: read
  security-events: read
  
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

# ================= BUILD ================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Start build timer
        run: echo "BUILD_START=$(date +%s%N)" >> $GITHUB_ENV
        
      - name: Debug repo structure
        run: ls -R
      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python-app
        run: |
          pip install -r requirements.txt

      - name: Compile check
        working-directory: apps/python-app
        run: python -m py_compile app.py

      - name: End build timer
        run: echo "BUILD_END=$(date +%s%N)" >> $GITHUB_ENV

# ================= DEPLOY =================
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build

    steps:
      - name: Start deploy timer
        run: echo "DEPLOY_START=$(date +%s)" >> $GITHUB_ENV
      - name: Trigger Render deploy
        run: |
          curl -X POST "https://api.render.com/deploy/srv_${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}"
      - name: End deploy timer
        run: echo "DEPLOY_END=$(date +%s)" >> $GITHUB_ENV


            
# ================= SMOKE TESTS =================
  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy
     
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke-tests.sh
          ./scripts/smoke-tests.sh https://mgr.onrender.com

