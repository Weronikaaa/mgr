name: Python CI/CD

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read
  checks: read
  deployments: read
  packages: read
  pull-requests: read
  repository-projects: read
  security-events: read
  
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

# ================= BUILD =================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Start build timer
        run: echo "BUILD_START=$(date +%s%N)" >> $GITHUB_ENV
      - name: Debug repo structure
        run: ls -R
      - name: Start build timer
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python-app
        run: |
          pip install -r requirements.txt

      - name: Compile check
        working-directory: apps/python-app
        run: python -m py_compile app.py

      - name: End build timer
        run: echo "BUILD_END=$(date +%s%N)" >> $GITHUB_ENV

# ================= SAST (Bandit jako zamiennik Sonara na start) =================
  sast-bandit:
    runs-on: ubuntu-latest
    needs: build
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Start Bandit timer
        id: bandit-start
        run: echo "time=$(date +%s%N)" >> $GITHUB_OUTPUT
  
      - name: Install Bandit
        run: pip install bandit
  
      - name: Run SAST
        run: bandit -r apps/python-app -f json -o bandit-report.json || true
  
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          
      - name: End Bandit timer
        id: bandit-end
        run: echo "time=$(date +%s%N)" >> $GITHUB_OUTPUT
  
      - name: Create metrics directory
        run: mkdir -p metrics
  
      - name: Calculate Bandit metrics
        run: |
          python scripts/calculate_tool_metrics.py \
            --tool bandit \
            --start ${{ steps.bandit-start.outputs.time }} \
            --end ${{ steps.bandit-end.outputs.time }}

# ================= SAST (SonarQube Cloud) - porównanie z Bandit =================
  sast-sonarqube:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Start SonarQube timer
        id: sonar-start
        run: echo "time=$(date +%s%N)" >> $GITHUB_OUTPUT
      
      - name: SonarQube Scan (without conflicting options)
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.python.version=3.11
            -Dsonar.sources=apps/python-app
            -Dsonar.scm.provider=git
            -Dsonar.verbose=true
      
      - name: Wait for SonarQube processing
        run: |
          echo "Waiting for SonarQube to process results..."
          sleep 30
      
      - name: Download SonarQube report
        run: |
          # Pobierz wyniki z SonarQube API
          curl -s -u ${{ secrets.SONAR_TOKEN }}: \
            "https://sonarcloud.io/api/measures/component?component=${{ secrets.SONAR_PROJECT_KEY }}&metricKeys=bugs,vulnerabilities,security_hotspots,code_smells,coverage,duplicated_lines_density" \
            -o sonarqube-metrics.json
          
          echo "SonarQube metrics:"
          cat sonarqube-metrics.json
      
      - name: End SonarQube timer
        id: sonar-end
        run: echo "time=$(date +%s%N)" >> $GITHUB_OUTPUT
      
      - name: Create metrics directory
        run: mkdir -p metrics
      
      - name: Calculate SonarQube metrics
        run: |
          python scripts/calculate_tool_metrics.py \
            --tool sonarqube \
            --start ${{ steps.sonar-start.outputs.time }} \
            --end ${{ steps.sonar-end.outputs.time }}
      
      - name: Upload SonarQube report
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-report
          path: |
            sonarqube-metrics.json
          
# ================= SECRET SCAN (Gitleaks) =================
  gitleaks:
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Install Gitleaks
        run: |
          # Pobierz i zainstaluj najnowszy Gitleaks
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar xzf gitleaks_8.18.0_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
  
      - name: Run Gitleaks (JSON format)
        run: |
          # Uruchom skanowanie i zapisz w formacie JSON (łatwiejszy do parsowania)
          gitleaks detect --source . --report-format json --report-path gitleaks-report.json || true
          
          # Dodatkowo zapisz w SARIF (jeśli potrzebujesz)
          gitleaks detect --source . --report-format sarif --report-path gitleaks-results.sarif || true
          
          # Pokaż co zostało utworzone
          echo "=== Generated reports ==="
          ls -la gitleaks-*
  
      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: |
            gitleaks-report.json
            gitleaks-results.sarif

# ================= SCA (Trivy) =================
  sca-trivy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: apps/python-app
          format: json
          output: trivy-report.json

      - name: Upload Trivy FS report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json


# ================= SCA (OWASP Dependency Check) - porównanie z Trivy =================
  # ================= SCA (OWASP Dependency Check) - porównanie z Trivy =================
  sca-owasp:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Start OWASP timer
        id: owasp-start
        run: echo "time=$(date +%s%N)" >> $GITHUB_OUTPUT
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set JAVA_HOME (fix)
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME_17_X64=$JAVA_HOME" >> $GITHUB_ENV
          echo "Java path: $JAVA_HOME"
          java -version
      
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'mgr'
          path: 'apps/python-app'
          format: 'JSON'
          out: 'owasp-report.json'
          args: >
            --enableExperimental
            --failOnCVSS 9
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
      
      - name: End OWASP timer
        id: owasp-end
        run: echo "time=$(date +%s%N)" >> $GITHUB_OUTPUT
      
      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: owasp-report.json

# ================= CONTAINER SCAN =================
  container-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t python-app ./apps/python-app

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: python-app
          format: json
          output: trivy-image.json

      - name: Upload Trivy image report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image
          path: trivy-image.json

# ================= DEPLOY =================
  deploy:
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Start deploy timer
        run: echo "DEPLOY_START=$(date +%s)" >> $GITHUB_ENV
      - name: Trigger Render deploy
        run: |
          curl -X POST "https://api.render.com/deploy/srv_${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}"
      - name: End deploy timer
        run: echo "DEPLOY_END=$(date +%s)" >> $GITHUB_ENV

# ================= SMOKE TESTS =================
  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke-tests.sh
          ./scripts/smoke-tests.sh https://mgr.onrender.com

  metrics:
    runs-on: ubuntu-latest
    needs: [sast-bandit, sast-sonarqube, gitleaks, sca-owasp, sca-trivy, container-scan, smoke-tests]
  
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
  
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
  
      - name: Aggregate metrics
        run: python scripts/aggregate-metrics.py
  
      - name: Upload final metrics
        uses: actions/upload-artifact@v4
        with:
          name: final-metrics
          path: metrics/
# Dodaj do swojego pipeline
  generate-dashboard:
    runs-on: ubuntu-latest
    needs: [metrics, gitleaks]  # ← DODAJ gitleaks do needs
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Debug - list all downloaded artifacts
        run: |
          echo "=== All downloaded files ==="
          find artifacts/ -type f
          echo ""
          echo "=== Looking for gitleaks ==="
          find artifacts/ -name "*gitleak*" -type f
      
      - name: Copy reports to metrics directory
        run: |
          mkdir -p metrics
          # Kopiuj wszystkie raporty do metrics/
          find artifacts/ -name "bandit-report.json" -exec cp {} metrics/ \;
          find artifacts/ -name "trivy-report.json" -exec cp {} metrics/ \;
          find artifacts/ -name "trivy-image.json" -exec cp {} metrics/ \;
          find artifacts/ -name "gitleaks*" -exec cp {} metrics/ \;
          
          echo "=== Files in metrics/ ==="
          ls -la metrics/
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install matplotlib pandas numpy plotly
      
      - name: Generate dashboard
        run: python scripts/generate-dashboard.py
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy dashboard'
          force_orphan: true
          keep_files: false
