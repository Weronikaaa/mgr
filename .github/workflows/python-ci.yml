name: Python CI/CD

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read
  checks: read
  deployments: read
  packages: read
  pull-requests: read
  repository-projects: read
  security-events: read
  
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

# ================= BUILD =================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Debug repo structure
        run: ls -R
      - name: Start build timer
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python-app
        run: |
          pip install -r requirements.txt

      - name: Compile check
        working-directory: apps/python-app
        run: python -m py_compile app.py

# ================= SAST (Bandit jako zamiennik Sonara na start) =================
  sast:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit

      - name: Run SAST
        run: bandit -r apps/python-app -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

# ================= SECRET SCAN (Gitleaks) =================
# ================= SECRET SCAN (Gitleaks) =================
  gitleaks:
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --report-format sarif --report-path gitleaks-results.sarif || true
      
      - name: Debug - check if file exists    # <-- DODAJ TEN KROK
        run: |
          echo "=== Current directory contents ==="
          ls -la
          echo ""
          echo "=== Looking for sarif files ==="
          find . -name "*.sarif" -type f
          echo ""
          echo "=== Looking for gitleaks files ==="
          find . -name "*gitleak*" -type f
          echo ""
          echo "=== File size if exists ==="
          if [ -f "gitleaks-results.sarif" ]; then
            echo "File exists! Size: $(wc -c < gitleaks-results.sarif) bytes"
            head -5 gitleaks-results.sarif
          else
            echo "File gitleaks-results.sarif DOES NOT EXIST!"
          fi
      
      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-results.sarif   

# ================= SCA (Trivy) =================
  sca:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: apps/python-app
          format: json
          output: trivy-report.json

      - name: Upload Trivy FS report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

# ================= CONTAINER SCAN =================
  container-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t python-app ./apps/python-app

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: python-app
          format: json
          output: trivy-image.json

      - name: Upload Trivy image report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image
          path: trivy-image.json

# ================= DEPLOY =================
  deploy:
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Start deploy timer
        run: echo "DEPLOY_START=$(date +%s)" >> $GITHUB_ENV
      - name: Trigger Render deploy
        run: |
          curl -X POST "https://api.render.com/deploy/srv_${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}"
      - name: End deploy timer
        run: echo "DEPLOY_END=$(date +%s)" >> $GITHUB_ENV

# ================= SMOKE TESTS =================
  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke-tests.sh
          ./scripts/smoke-tests.sh https://mgr.onrender.com

  metrics:
    runs-on: ubuntu-latest
    needs: [sast, gitleaks, sca, container-scan, smoke-tests]
  
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
  
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
  
      - name: Aggregate metrics
        run: python scripts/aggregate-metrics.py
  
      - name: Upload final metrics
        uses: actions/upload-artifact@v4
        with:
          name: final-metrics
          path: metrics/
# Dodaj do swojego pipeline
  generate-dashboard:
    runs-on: ubuntu-latest
    needs: [metrics, gitleaks]  # ← DODAJ gitleaks do needs
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Debug - list all downloaded artifacts
        run: |
          echo "=== All downloaded files ==="
          find artifacts/ -type f
          echo ""
          echo "=== Looking for gitleaks ==="
          find artifacts/ -name "*gitleak*" -type f
      
      - name: Copy reports to metrics directory
        run: |
          mkdir -p metrics
          # Kopiuj wszystkie raporty do metrics/
          find artifacts/ -name "bandit-report.json" -exec cp {} metrics/ \;
          find artifacts/ -name "trivy-report.json" -exec cp {} metrics/ \;
          find artifacts/ -name "trivy-image.json" -exec cp {} metrics/ \;
          find artifacts/ -name "gitleaks*" -exec cp {} metrics/ \;
          
          echo "=== Files in metrics/ ==="
          ls -la metrics/
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install matplotlib pandas numpy plotly
      
      - name: Generate dashboard
        run: python scripts/generate-dashboard.py
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy dashboard'
          force_orphan: true
          keep_files: false
