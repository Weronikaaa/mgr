name: Python CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

# ================= BUILD =================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python-app
        run: |
          pip install -r requirements.txt

      - name: Compile check
        working-directory: apps/python-app
        run: python -m py_compile app.py

# ================= SAST (Bandit jako zamiennik Sonara na start) =================
  sast:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit

      - name: Run SAST
        run: bandit -r apps/python-app -f json -o bandit-report.json || true

# ================= SECRET SCAN (Gitleaks) =================
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path gitleaks-report.json

# ================= SCA (Trivy) =================
  sca:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: apps/python-app
          format: json
          output: trivy-report.json

# ================= CONTAINER SCAN =================
  container-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t python-app ./apps/python-app

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: python-app
          format: json
          output: trivy-image.json

# ================= DEPLOY =================
  deploy:
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "https://api.render.com/deploy/srv_${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}"

# ================= SMOKE TESTS =================
  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke-tests.sh
          ./scripts/smoke-tests.sh https://mgr.onrender.com
